{% extends "base.html" %}
{% block title %}{{ code }} Error – ResumeAI{% endblock %}
{% block body %}
<div class="min-h-screen hero-gradient flex items-center justify-center px-4">
  <div class="text-center animate-slide-up">
    <div class="text-8xl font-black gradient-text mb-4">{{ code }}</div>
    <h1 class="text-2xl font-bold text-white mb-3">{{ message }}</h1>
    <p class="text-gray-400 mb-8">Something went wrong. Let's get you back on track.</p>
    <div class="flex items-center justify-center gap-4">
      <a href="/dashboard" class="btn-primary px-6 py-2.5">Go to Dashboard</a>
      <a href="/" class="btn-secondary px-6 py-2.5">Home</a>
    </div>
  </div>
</div>
{% endblock %}
