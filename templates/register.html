{% extends "base.html" %}
{% block title %}Create Account – ResumeAI{% endblock %}

{% block body %}
<div class="min-h-screen hero-gradient flex items-center justify-center px-4 py-12">
  <div class="glow-dot w-72 h-72 bg-indigo-600/20 top-10 right-10 fixed"></div>
  <div class="glow-dot w-60 h-60 bg-purple-600/15 bottom-10 left-10 fixed"></div>

  <div class="w-full max-w-md relative z-10 animate-slide-up">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 font-bold text-2xl">
        <span class="text-3xl">⚡</span>
        <span class="gradient-text-brand">ResumeAI</span>
      </a>
      <h1 class="text-2xl font-bold mt-6 mb-1 text-white">Create your account</h1>
      <p class="text-gray-400 text-sm">Start building smarter resumes today</p>
    </div>

    <!-- Card -->
    <div class="glass-card p-8">
      <!-- Google OAuth -->
      <a href="/auth/google" id="google-register-btn"
         class="flex items-center justify-center gap-3 w-full py-3 px-4 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 rounded-xl transition-all duration-200 font-medium text-sm text-gray-200 mb-6">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </a>

      <div class="flex items-center gap-3 mb-6">
        <div class="flex-1 h-px bg-white/8"></div>
        <span class="text-gray-500 text-xs uppercase tracking-widest">or</span>
        <div class="flex-1 h-px bg-white/8"></div>
      </div>

      <form id="register-form" method="POST" action="/register" class="space-y-4">
        <div>
          <label class="form-label" for="name">Full name</label>
          <input id="name" name="name" type="text" required autocomplete="name"
                 class="form-input" placeholder="Jane Smith" />
        </div>
        <div>
          <label class="form-label" for="email">Email address</label>
          <input id="email" name="email" type="email" required autocomplete="email"
                 class="form-input" placeholder="jane@example.com" />
        </div>
        <div>
          <label class="form-label" for="password">Password <span class="text-gray-600">(min 6 chars)</span></label>
          <div class="relative">
            <input id="password" name="password" type="password" required autocomplete="new-password"
                   minlength="6" class="form-input pr-10" placeholder="••••••••" />
            <button type="button" id="toggle-reg-pwd"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-sm"
                    aria-label="Toggle password visibility">👁</button>
          </div>
          <!-- Strength bar -->
          <div class="mt-2">
            <div class="progress-bar-track">
              <div id="pwd-strength-bar" class="progress-bar-fill" style="width:0%;background:linear-gradient(90deg,#ef4444,#f97316)"></div>
            </div>
            <p id="pwd-strength-text" class="text-xs text-gray-500 mt-1"></p>
          </div>
        </div>

        <button id="register-submit-btn" type="submit" class="btn-primary w-full py-3 mt-2">
          Create Free Account
        </button>
      </form>
    </div>

    <p class="text-center text-gray-500 text-sm mt-6">
      Already have an account?
      <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">Sign in →</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById('toggle-reg-pwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const bar = document.getElementById('pwd-strength-bar');
    const txt = document.getElementById('pwd-strength-text');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const widths  = ['0%','20%','40%','60%','80%','100%'];
    const colors  = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    const labels  = ['','Weak','Fair','Good','Strong','Very Strong'];
    bar.style.width  = widths[score];
    bar.style.background = `linear-gradient(90deg, ${colors[score-1] || '#ef4444'}, ${colors[Math.min(score,4)]})`;
    txt.textContent  = labels[score] || '';
    txt.style.color  = colors[score-1] || '#64748b';
  });

  document.getElementById('register-form').addEventListener('submit', function() {
    const btn = document.getElementById('register-submit-btn');
    btn.innerHTML = '<div class="spinner"></div> Creating account...';
    btn.disabled = true;
  });
</script>
{% endblock %}
